name = "joby-r2-videos"
main = "src/index.ts"
compatibility_date = "2024-01-15"

[dev]
ip = "127.0.0.1"
port = 8787
local_protocol = "http"

# R2 Bucket binding
[[r2_buckets]]
binding = "VIDEOS_BUCKET"
bucket_name = "videos-joby"

# Variáveis de ambiente (secrets devem ser configuradas no Dashboard)
# Estas são apenas placeholders - configure as secrets no Dashboard
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# R2_ACCOUNT_ID
